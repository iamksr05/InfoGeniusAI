<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Nikhil</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700;900&family=Pacifico&display=swap');

        :root {
            --primary: #ff4757;
            --secondary: #2f3542;
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --text-shadow: 0 4px 15px rgba(255, 71, 87, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            perspective: 1000px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 20px;
        }

        .word-wrapper {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
        }

        .text-line {
            display: block;
            opacity: 0;
            transform: translateY(50px) scale(0.9);
            animation: textEntrance 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .word-i {
            font-size: clamp(3rem, 10vw, 6rem);
            color: #ffffff;
            animation-delay: 0.5s;
        }

        .word-love {
            font-family: 'Pacifico', cursive;
            font-size: clamp(4rem, 15vw, 8rem);
            color: var(--primary);
            text-shadow: var(--text-shadow);
            animation-delay: 1.2s;
            animation: textEntrance 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, heartbeat 1.5s ease-in-out infinite 2.2s;
        }

        .word-you {
            font-size: clamp(3rem, 10vw, 6rem);
            color: #ffffff;
            animation-delay: 2.2s;
        }

        .word-name {
            font-size: clamp(4rem, 12vw, 7rem);
            background: linear-gradient(to right, #ff9966, #ff5e62);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-transform: uppercase;
            letter-spacing: 4px;
            animation-delay: 3s;
            position: relative;
        }

        .word-name::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -10px;
            width: 0;
            height: 4px;
            background: linear-gradient(to right, #ff9966, #ff5e62);
            animation: underline 1s ease-out forwards 3.8s;
            border-radius: 2px;
        }

        /* Animations */
        @keyframes textEntrance {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.1); text-shadow: 0 0 20px var(--primary); }
            28% { transform: scale(1); }
            42% { transform: scale(1.1); text-shadow: 0 0 20px var(--primary); }
            70% { transform: scale(1); }
        }

        @keyframes underline {
            to { width: 100%; }
        }

        /* Floating particles */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            display: block;
            list-style: none;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
            animation: floatUp 25s linear infinite;
            bottom: -150px;
            border-radius: 50%;
        }

        .particle:nth-child(1) { left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
        .particle:nth-child(2) { left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s; }
        .particle:nth-child(3) { left: 70%; width: 20px; height: 20px; animation-delay: 4s; }
        .particle:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; }
        .particle:nth-child(5) { left: 65%; width: 20px; height: 20px; animation-delay: 0s; }
        .particle:nth-child(6) { left: 75%; width: 110px; height: 110px; animation-delay: 3s; }
        .particle:nth-child(7) { left: 35%; width: 150px; height: 150px; animation-delay: 7s; }
        .particle:nth-child(8) { left: 50%; width: 25px; height: 25px; animation-delay: 15s; animation-duration: 45s; }
        .particle:nth-child(9) { left: 20%; width: 15px; height: 15px; animation-delay: 2s; animation-duration: 35s; }
        .particle:nth-child(10) { left: 85%; width: 150px; height: 150px; animation-delay: 0s; animation-duration: 11s; }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; }
        }

        /* Mobile specific adjustments */
        @media (max-width: 600px) {
            .word-wrapper {
                gap: 0.5rem;
            }
            
            .word-name {
                letter-spacing: 2px;
            }
        }
    </style>
</head>
<body>

    <div class="particles">
        <li class="particle"></li>
        <li class="particle"></li>
        <li class="particle"></li>
        <li class="particle"></li>
        <li class="particle"></li>
        <li class="particle"></li>
        <li class="particle"></li>
        <li class="particle"></li>
        <li class="particle"></li>
        <li class="particle"></li>
    </div>

    <div class="container">
        <div class="word-wrapper">
            <span class="text-line word-i" style="animation-delay: 0.2s;">I</span>
            <span class="text-line word-love" style="animation-delay: 0.8s;">Love</span>
            <span class="text-line word-you" style="animation-delay: 1.5s;">You</span>
            <span class="text-line word-name" style="animation-delay: 2.2s;">Nikhil</span>
        </div>
    </div>

</body>
</html>
