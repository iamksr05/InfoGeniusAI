<head>
  <meta charset="UTF-8" />
  <title>InfoGenius AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#050509" />
  <link rel="shortcut icon" href="AI_logo.png" type="image/x-icon">
  <link rel="apple-touch-icon" href="icons/apple-icon-180.png">
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      }
    };
  </script>
</head>

<body>
  <div id="app">
    <header id="header">
      <div class="app-title">InfoGenius AI</div>
      <div class="header-controls">
        <div class="toggle-container model-2-control">
          <span class="status-indicator"></span>
          <span class="toggle-label" id="model-2-status">Model 2 Offline</span>
          <label class="switch">
            <input type="checkbox" id="model-toggle">
            <span class="slider round"></span>
          </label>
        </div>
        <button class="icon-btn" id="theme-btn"><span class="material-icons-round">light_mode</span></button>
      </div>
    </header>

    <div id="hero-section">
      <img src="./AI_logo.png" class="hero-logo" alt="InfoGenius AI" />
      <h1 class="hero-title">How can I help you<br>today?</h1>
      <p class="hero-subtitle">Ask me anything or start a voice conversation</p>
    </div>

    <div id="chat_container"></div>

    <div id="input-area">
      <form>
        <textarea id="prompt" name="prompt" rows="1" cols="1" placeholder="Type your message..."></textarea>
        <button type="submit" id="sendButton">
          <span id="sendIcon" class="material-icons-round">arrow_upward</span>
        </button>
      </form>
    </div>
  </div>


  <script type="module" src="script.js"></script>
</body>
